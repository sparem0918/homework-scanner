<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>시험지 지우개</title>
<link rel="manifest" href="/static/manifest.json" />
<meta name="theme-color" content="#FCFBF8" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="시험지 지우개" />
<link rel="apple-touch-icon" href="/static/icon.svg" />
<style>
  :root{
    --paper:#FCFBF8;
    --ink:#22252A;
    --muted:#8A8F98;
    --hair:#E7E3DA;
    --coral:#FF6B5E;
    --coral-press:#E85547;
    --card:#FFFFFF;
    --mono:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);}
  body{
    min-height:100dvh;
    padding:env(safe-area-inset-top) 18px calc(env(safe-area-inset-bottom) + 18px);
    max-width:560px;margin:0 auto;
  }

  header{padding:26px 2px 18px;}
  .eyebrow{
    font-family:var(--mono);font-size:12px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--muted);margin:0 0 8px;
  }
  h1{font-size:30px;line-height:1.1;margin:0;letter-spacing:-.01em;font-weight:680;}
  h1 .mark{position:relative;white-space:nowrap;}
  h1 .mark::after{
    content:"";position:absolute;left:-2px;right:-2px;bottom:6px;height:11px;
    background:var(--coral);opacity:.28;z-index:-1;border-radius:2px;
  }
  .sub{color:var(--muted);font-size:14.5px;line-height:1.5;margin:12px 2px 0;}

  /* 업로드 영역 */
  .drop{
    display:block;margin-top:20px;border:1.5px solid var(--hair);border-radius:18px;
    background:var(--card);padding:30px 18px;text-align:center;cursor:pointer;
    transition:border-color .15s,background .15s;
  }
  .drop:active{border-color:var(--coral);background:#FFFCFB;}
  .drop .ic{font-size:30px;}
  .drop .t{margin-top:10px;font-weight:600;font-size:16px;}
  .drop .h{margin-top:5px;color:var(--muted);font-size:13px;}
  input[type=file]{display:none;}

  .preview-wrap{margin-top:18px;display:none;}
  .preview-wrap img{width:100%;border-radius:16px;display:block;border:1px solid var(--hair);}

  /* 모드 전환 */
  .modes{display:flex;gap:8px;margin-top:18px;}
  .mode{
    flex:1;border:1.5px solid var(--hair);background:var(--card);border-radius:14px;
    padding:13px 10px;text-align:left;cursor:pointer;transition:border-color .15s;
  }
  .mode[aria-pressed=true]{border-color:var(--ink);}
  .mode .name{font-weight:660;font-size:15px;}
  .mode .name::before{
    content:"";display:inline-block;width:9px;height:9px;border-radius:50%;
    border:1.5px solid var(--muted);margin-right:7px;vertical-align:middle;
  }
  .mode[aria-pressed=true] .name::before{background:var(--coral);border-color:var(--coral);}
  .mode .desc{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:.02em;}

  /* 실행 버튼 */
  .go{
    display:block;width:100%;margin-top:16px;border:none;border-radius:14px;
    background:var(--coral);color:#fff;font-weight:700;font-size:17px;
    padding:16px;cursor:pointer;font-family:var(--sans);
    transition:background .12s,transform .06s;
  }
  .go:active{background:var(--coral-press);transform:translateY(1px);}
  .go:disabled{background:#D9D6CF;color:#fff;cursor:default;}

  /* 결과 비교 슬라이더 (시그니처) */
  .result{margin-top:24px;display:none;}
  .result h2{
    font-family:var(--mono);font-size:12px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--muted);margin:0 0 10px;
  }
  .compare{
    position:relative;width:100%;border-radius:16px;overflow:hidden;
    border:1px solid var(--hair);touch-action:none;user-select:none;background:#fff;
  }
  .compare img{display:block;width:100%;pointer-events:none;}
  .compare .after{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
    clip-path:inset(0 0 0 50%);}
  .compare .handle{
    position:absolute;top:0;bottom:0;left:50%;width:2px;background:var(--coral);
    transform:translateX(-1px);
  }
  .compare .knob{
    position:absolute;top:50%;left:50%;width:38px;height:38px;border-radius:50%;
    background:#fff;border:2px solid var(--coral);transform:translate(-50%,-50%);
    display:flex;align-items:center;justify-content:center;color:var(--coral);
    font-size:15px;box-shadow:0 2px 8px rgba(0,0,0,.12);
  }
  .tag{
    position:absolute;top:10px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;
    background:rgba(34,37,42,.72);color:#fff;padding:3px 8px;border-radius:20px;
  }
  .tag.l{left:10px;} .tag.r{right:10px;}

  .save{
    display:block;width:100%;margin-top:14px;text-align:center;text-decoration:none;
    border:1.5px solid var(--ink);border-radius:14px;padding:14px;color:var(--ink);
    font-weight:660;font-size:16px;
  }
  .save:active{background:#F4F1EA;}

  /* 로딩 */
  .overlay{
    position:fixed;inset:0;background:rgba(252,251,248,.86);backdrop-filter:blur(2px);
    display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:50;
  }
  .spin{width:34px;height:34px;border-radius:50%;border:3px solid var(--hair);
    border-top-color:var(--coral);animation:sp .8s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}
  .overlay p{font-family:var(--mono);font-size:13px;color:var(--ink);letter-spacing:.04em;}

  /* 오류 */
  .toast{
    display:none;margin-top:14px;border:1px solid #F2C4BE;background:#FFF4F2;
    color:#A33529;border-radius:12px;padding:12px 14px;font-size:14px;line-height:1.45;
  }

  footer{margin-top:30px;color:var(--muted);font-size:12px;line-height:1.6;}
  @media (prefers-reduced-motion:reduce){.spin{animation:none;}}
</style>
</head>
<body>
  <header>
    <p class="eyebrow">오답노트 만들기</p>
    <h1>시험지 <span class="mark">지우개</span></h1>
    <p class="sub">찍은 시험지에서 필기를 지워 깨끗한 다시풀기용 시험지를 만듭니다.</p>
  </header>

  <label class="drop" id="drop">
    <div class="ic">📄</div>
    <div class="t">시험지 촬영 또는 사진 선택</div>
    <div class="h">한 장씩 또렷하게 찍어 주세요</div>
    <input type="file" id="file" accept="image/*" capture="environment" />
  </label>

  <div class="preview-wrap" id="previewWrap">
    <img id="preview" alt="선택한 시험지" />
  </div>

  <div class="modes" id="modes">
    <button class="mode" id="mFree" aria-pressed="true">
      <div class="name">무료 · 빠르게</div>
      <div class="desc">컬러 펜 제거 · 오프라인</div>
    </button>
    <button class="mode" id="mAi" aria-pressed="false">
      <div class="name">AI · 정밀</div>
      <div class="desc">검정펜/연필까지 · 유료</div>
    </button>
  </div>

  <button class="go" id="go" disabled>필기 지우기</button>
  <div class="toast" id="toast"></div>

  <section class="result" id="result">
    <h2>전 · 후 비교 — 손잡이를 밀어 보세요</h2>
    <div class="compare" id="compare">
      <img id="before" alt="원본" />
      <img id="after" class="after" alt="지운 결과" />
      <span class="tag l">전</span>
      <span class="tag r">후</span>
      <div class="handle" id="handle"></div>
      <div class="knob" id="knob">⇄</div>
    </div>
    <a class="save" id="save" download="erased.png">결과 저장</a>
  </section>

  <footer>
    무료 모드는 파랑·빨강·초록 같은 <b>컬러 잉크</b>를 지웁니다.
    검은 볼펜·연필이 인쇄 글씨와 겹쳐 안 지워지면 <b>AI 정밀</b> 모드를 쓰세요.
  </footer>

  <div class="overlay" id="overlay">
    <div class="spin"></div>
    <p id="overlayText">지우는 중…</p>
  </div>

<script>
  const $ = (id) => document.getElementById(id);
  const fileInput = $("file");
  const drop = $("drop");
  const previewWrap = $("previewWrap");
  const preview = $("preview");
  const go = $("go");
  const toast = $("toast");
  const overlay = $("overlay");
  const overlayText = $("overlayText");
  const result = $("result");

  let currentFile = null;
  let mode = "free";

  // 모드 전환
  $("mFree").addEventListener("click", () => setMode("free"));
  $("mAi").addEventListener("click", () => setMode("ai"));
  function setMode(m){
    mode = m;
    $("mFree").setAttribute("aria-pressed", m === "free");
    $("mAi").setAttribute("aria-pressed", m === "ai");
    go.textContent = m === "ai" ? "AI로 필기 지우기" : "필기 지우기";
  }

  // 파일 선택
  fileInput.addEventListener("change", (e) => {
    const f = e.target.files[0];
    if (!f) return;
    currentFile = f;
    preview.src = URL.createObjectURL(f);
    previewWrap.style.display = "block";
    result.style.display = "none";
    go.disabled = false;
    hideToast();
  });

  // 실행
  go.addEventListener("click", async () => {
    if (!currentFile) return;
    hideToast();
    overlayText.textContent = mode === "ai" ? "AI가 지우는 중… (몇 초 걸려요)" : "지우는 중…";
    overlay.style.display = "flex";
    go.disabled = true;

    try {
      const fd = new FormData();
      fd.append("file", currentFile);
      fd.append("mode", mode);
      const res = await fetch("/process", { method: "POST", body: fd });

      if (!res.ok) {
        let msg = "처리에 실패했습니다.";
        try { msg = (await res.json()).error || msg; } catch {}
        showToast(msg);
        return;
      }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      showResult(URL.createObjectURL(currentFile), url);
    } catch (err) {
      showToast("서버에 연결하지 못했습니다. 서버가 켜져 있는지 확인하세요.");
    } finally {
      overlay.style.display = "none";
      go.disabled = false;
    }
  });

  function showResult(beforeUrl, afterUrl){
    $("before").src = beforeUrl;
    $("after").src = afterUrl;
    $("save").href = afterUrl;
    result.style.display = "block";
    setSlider(50);
    result.scrollIntoView({ behavior: "smooth", block: "start" });
  }

  function showToast(m){ toast.textContent = m; toast.style.display = "block"; }
  function hideToast(){ toast.style.display = "none"; }

  // 전/후 비교 슬라이더
  const compare = $("compare");
  const handle = $("handle");
  const knob = $("knob");
  const after = $("after");
  function setSlider(pct){
    pct = Math.max(0, Math.min(100, pct));
    after.style.clipPath = `inset(0 0 0 ${pct}%)`;
    handle.style.left = pct + "%";
    knob.style.left = pct + "%";
  }
  let dragging = false;
  function fromEvent(e){
    const r = compare.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
    setSlider((x / r.width) * 100);
  }
  const start = (e) => { dragging = true; fromEvent(e); };
  const move  = (e) => { if (dragging){ fromEvent(e); e.preventDefault(); } };
  const end   = () => { dragging = false; };
  compare.addEventListener("pointerdown", start);
  window.addEventListener("pointermove", move, { passive:false });
  window.addEventListener("pointerup", end);
</script>
</body>
</html>
